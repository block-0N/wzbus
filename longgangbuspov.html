<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙港公交POV合集</title>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 class="page-title">龙港公交POV合集</h1>
    <ul class="bus-list"></ul>
    <script src="./businfo.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const listContainer = document.querySelector('.bus-list');
            if (!listContainer) return;
            busRoutes.forEach(route => {
                if (!route.area.includes('龙港')) return;
                if (!route.povUrl || route.povUrl.includes('404.html')) return;
                const li = document.createElement('li');
                li.className = 'bus-item';
                const a = document.createElement('a');
                a.className = 'bus-link';
                a.href = route.povUrl;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = route.alias[0] + '公交视频';
                li.appendChild(a);
                listContainer.appendChild(li);
            });
        });
    </script>
</body>

</html>
