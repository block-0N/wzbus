<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苍南公交线路概况</title>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 class="page-title">苍南公交线路概况</h1>
    <ul class="bus-list"></ul>
    <script src="./businfo.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const listContainer = document.querySelector('.bus-list');
            if (!listContainer) return;
            busRoutes.forEach(route => {
                if (!route.area.includes('苍南') || route.alias[0].includes('龙港')) return;
                const li = document.createElement('li');
                li.className = 'bus-item';
                const a = document.createElement('a');
                a.className = 'bus-link';
                if (route.overviewUrl && !route.overviewUrl.includes('404.html'))
                    a.href = route.overviewUrl;
                //else a.href = 'https://wiki.wzbus.net/wiki/' + route.name;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = route.alias[0] + '线路概况';
                li.appendChild(a);
                listContainer.appendChild(li);
            });
        });
    </script>
</body>

</html>
